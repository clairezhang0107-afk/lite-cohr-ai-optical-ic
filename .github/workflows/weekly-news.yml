name: weekly-news

on:
  schedule:
    - cron: "0 1 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run weekly news update
        run: node scripts/update-news.mjs

      - name: Commit and push changes
        run: |
          if git diff --quiet -- data/news.json data/weekly-updates.json; then
            echo "No data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/weekly-updates.json
          git commit -m "weekly optical news update"
          git push
